<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Modern Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="game-header">
                <h1 class="game-title">
                    <span class="x-mark">Tic</span>
                    <span class="vs-mark">- Tac -</span>
                    <span class="o-mark">Toe</span>
                </h1>
                <div class="game-mode">
                    <button class="mode-btn active" onclick="setMode('two-player')">👥 2 Player</button>
                    <button class="mode-btn" onclick="setMode('vs-ai')">🤖 vs AI</button>
                </div>
            </div>

            <div class="status-card">
                <div class="turn-indicator">
                    <div class="turn-text" id="turnText">
                        <span class="player-turn">Player X's Turn</span>
                    </div>
                    <div class="score-board">
                        <div class="score-card x-score">
                            <span class="score-label">Player X</span>
                            <span class="score-value" id="xScore">0</span>
                        </div>
                        <div class="score-card tie-score">
                            <span class="score-label">Tie</span>
                            <span class="score-value" id="tieScore">0</span>
                        </div>
                        <div class="score-card o-score">
                            <span class="score-label">Player O</span>
                            <span class="score-value" id="oScore">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-board" id="gameBoard">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="game-controls">
                <button class="control-btn reset-btn" onclick="resetGame()">
                    🔄 New Game
                </button>
                <button class="control-btn reset-score-btn" onclick="resetScore()">
                    📊 Reset Score
                </button>
            </div>

            <div class="winner-modal" id="winnerModal">
                <div class="modal-content">
                    <div class="modal-emoji" id="modalEmoji">🏆</div>
                    <h2 id="modalMessage">Winner!</h2>
                    <button class="modal-btn" onclick="closeModal()">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
